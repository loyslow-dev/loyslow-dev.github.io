<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Маршрутизатор | Hello / Bye</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f6f9fc 0%, #eef2f5 100%);
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .card {
            max-width: 680px;
            width: 100%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(2px);
            border-radius: 2.5rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2), 0 1px 3px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .nav-bar {
            background: white;
            padding: 1rem 2rem;
            border-bottom: 1px solid #e9edf2;
            display: flex;
            gap: 1.2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: transparent;
            border: none;
            font-size: 1.1rem;
            font-weight: 500;
            padding: 0.6rem 1.3rem;
            border-radius: 2rem;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            color: #1e2f3e;
            background: #f1f5f9;
            backdrop-filter: blur(4px);
        }

        .nav-link i {
            font-style: normal;
            font-weight: 600;
            font-size: 1.2rem;
        }

        .nav-link:hover {
            background: #e2e8f0;
            transform: translateY(-2px);
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.05);
        }

        .nav-link:active {
            transform: translateY(1px);
        }

        .content-container {
            padding: 3rem 2rem;
            min-height: 380px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: #ffffffd9;
        }

        .message-box {
            animation: fadeSlideUp 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .greeting {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #0f2b3d, #1b4f6e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
        }

        .sub {
            font-size: 1.2rem;
            color: #4a627a;
            border-top: 2px solid #dce5ec;
            padding-top: 1.5rem;
            margin-top: 0.5rem;
            display: inline-block;
        }

        .path-badge {
            background: #eef2ff;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-family: monospace;
            font-size: 0.85rem;
            color: #2563eb;
            margin-top: 1.5rem;
            display: inline-block;
        }

        .not-found-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.7;
        }

        .info-note {
            background: #fef9e3;
            border-radius: 1.2rem;
            padding: 0.8rem 1.4rem;
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #b45309;
            border-left: 5px solid #f59e0b;
            text-align: left;
            max-width: 90%;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            padding: 1rem;
            background: #f8fafc;
            color: #6c7a8e;
            border-top: 1px solid #eef2f6;
        }

        button {
            background: none;
            border: none;
        }

        @media (max-width: 520px) {
            .greeting {
                font-size: 2.4rem;
            }
            .nav-bar {
                gap: 0.8rem;
                padding: 0.9rem;
            }
            .nav-link {
                padding: 0.4rem 1rem;
                font-size: 1rem;
            }
            .content-container {
                padding: 2rem 1.2rem;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="nav-bar">
        <a href="/hello" class="nav-link" data-route="hello"> ✨ /hello</a>
        <a href="/bye" class="nav-link" data-route="bye"> 🌙 /bye</a>
        <a href="/" class="nav-link" data-route="home"> 🏠 Главная</a>
    </div>

    <div class="content-container" id="app-root">
        <!-- динамический контент будет вставлен через JS -->
        <div class="message-box">Загрузка маршрута...</div>
    </div>
    <footer>
        ⚡ Клиентский роутинг | Для работы прямых ссылок /hello и /bye требуется<br>
        настройка сервера (SPA fallback: перенаправление всех путей на index.html)
    </footer>
</div>

<script>
    (function() {
        // --- Вспомогательные функции для роутинга ---
        // Нормализуем путь: убираем завершающий слеш, кроме корня, приводим к нижнему регистру (опционально)
        function normalizePath(path) {
            if (!path || path === '') return '/';
            // удаляем query и hash (если вдруг)
            let cleanPath = path.split('?')[0].split('#')[0];
            if (cleanPath !== '/' && cleanPath.endsWith('/')) {
                cleanPath = cleanPath.slice(0, -1);
            }
            return cleanPath;
        }

        // Получить текущий путь из window.location
        function getCurrentPath() {
            return normalizePath(window.location.pathname);
        }

        // Рендер контента в зависимости от пути
        function renderPageByPath(path) {
            const appRoot = document.getElementById('app-root');
            if (!appRoot) return;

            let title = 'Маршрутизатор';
            let contentHtml = '';

            // Определяем контент по маршруту
            if (path === '/hello') {
                title = 'Приветствие | Hello world!';
                contentHtml = `
                    <div class="message-box">
                        <div class="greeting">👋 Hello world!</div>
                        <div class="sub">Добро пожаловать на страницу приветствия</div>
                        <div class="path-badge">📍 ${path}</div>
                    </div>
                `;
            } 
            else if (path === '/bye') {
                title = 'Прощание | Bye, bye!';
                contentHtml = `
                    <div class="message-box">
                        <div class="greeting">👋 Bye, bye!</div>
                        <div class="sub">До скорой встречи! Возвращайтесь :)</div>
                        <div class="path-badge">📍 ${path}</div>
                    </div>
                `;
            }
            else if (path === '/') {
                title = 'Главная | Hello / Bye';
                contentHtml = `
                    <div class="message-box">
                        <div class="greeting" style="font-size:2.6rem;">🏠 Домашняя страница</div>
                        <div class="sub">Выберите маршрут в меню:<br> <strong style="background:#eef2ff; padding:0.2rem 0.8rem; border-radius:30px;">/hello</strong> или <strong style="background:#eef2ff; padding:0.2rem 0.8rem; border-radius:30px;">/bye</strong></div>
                        <div class="path-badge">📍 корневой путь /</div>
                    </div>
                `;
            }
            else {
                title = '404 — Страница не найдена';
                contentHtml = `
                    <div class="message-box">
                        <div class="not-found-icon">🔍 ❓</div>
                        <div class="greeting" style="font-size:2.2rem; background:linear-gradient(135deg,#8b5a2b,#b97f44); background-clip:text; -webkit-background-clip:text;">Маршрут не обнаружен</div>
                        <div class="sub">Путь <code style="background:#eef2ff; padding:0.2rem 0.5rem; border-radius:12px;">${escapeHtml(path)}</code> не соответствует /hello или /bye</div>
                        <div class="path-badge">❌ неизвестный маршрут</div>
                        <div class="info-note">
                            💡 Для перехода используйте навигацию выше или адресную строку: <strong>/hello</strong> или <strong>/bye</strong>
                        </div>
                    </div>
                `;
            }

            // Обновляем заголовок документа
            document.title = title;
            // Плавно обновляем контент с легкой анимацией (через замену innerHTML)
            appRoot.style.opacity = '0';
            setTimeout(() => {
                appRoot.innerHTML = contentHtml;
                appRoot.style.opacity = '1';
            }, 20);
            appRoot.style.transition = 'opacity 0.18s ease';
            appRoot.style.opacity = '1';
        }

        // простая защита от XSS при отображении пути
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }

        // --- Навигация без перезагрузки страницы (History API) ---
        function navigateTo(url, options = { replace: false }) {
            if (!url || url === '') url = '/';
            // убедимся что url начинается с '/' для относительности
            let targetUrl = url.startsWith('/') ? url : '/' + url;
            const currentPath = getCurrentPath();
            const newPath = normalizePath(targetUrl);
            
            // если путь не изменился, просто обновляем рендер (на случай, если вызвано вручную)
            if (currentPath === newPath && !options.force) {
                renderPageByPath(newPath);
                return;
            }
            
            // используем pushState или replaceState
            if (options.replace) {
                window.history.replaceState(null, '', targetUrl);
            } else {
                window.history.pushState(null, '', targetUrl);
            }
            // обновляем отображение
            renderPageByPath(getCurrentPath());
        }

        // --- Обработчик кликов по ссылкам с классом nav-link (SPA-переход без перезагрузки) ---
        function handleLinkClick(event) {
            const target = event.target.closest('a');  // ищем родительский тег a если клик по вложенному элементу
            if (!target) return;
            
            // проверяем, что ссылка имеет класс nav-link ИЛИ data-route атрибут (для безопасности)
            const isNavLink = target.classList.contains('nav-link') || target.hasAttribute('data-route');
            if (!isNavLink) return;
            
            const href = target.getAttribute('href');
            if (!href || href.startsWith('http') || href.startsWith('//') || href === '#') {
                // внешние ссылки или якоря не обрабатываем
                return;
            }
            
            // разрешаем стандартное поведение при зажатых модификаторах (ctrl, cmd, alt для открытия в новой вкладке)
            if (event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) {
                return;
            }
            
            event.preventDefault();
            // обрабатываем переход по внутренней ссылке
            navigateTo(href);
        }

        // --- Обработчик кнопки назад/вперед (popstate) ---
        function onPopState() {
            const currentPath = getCurrentPath();
            renderPageByPath(currentPath);
        }

        // --- Инициализация приложения: отслеживание событий и первый рендер ---
        function initRouter() {
            // первичный рендер на основе текущего URL
            const initialPath = getCurrentPath();
            renderPageByPath(initialPath);
            
            // подписываемся на клики по документу (делегирование для динамических и статических ссылок)
            document.addEventListener('click', handleLinkClick);
            
            // отслеживаем события браузера (назад/вперед)
            window.addEventListener('popstate', onPopState);
            
            // Доп. элегантность: если вдруг какой-то скрипт вызовет программное изменение URL,
            // но popstate сработает только при ручном взаимодействии — всё корректно.
        }
        
        // Запускаем роутер после полной загрузки DOM
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initRouter);
        } else {
            initRouter();
        }
        
        // Экспортируем вспомогательные методы в глобальный объект для отладки (опционально)
        window.__router = {
            navigate: navigateTo,
            getPath: getCurrentPath,
            refresh: () => renderPageByPath(getCurrentPath())
        };
    })();
</script>
</body>
</html>
